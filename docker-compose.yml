services: 
  db:
    image: pgvector/pgvector:pg17
    environment: 
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fencing_agent
    ports:
      - "5432:5432"
    volumes: 
      - pgdata:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app: 
    build: .
    ports: 
      - "8000:8000"
    env_file:
      - .env 
    depends_on:
      db:
        condition: service_healthy

volumes: 
  pgdata:
